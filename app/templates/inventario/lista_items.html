{% extends 'base.html' %}
{% block content %}
<div class="container-fluid">
    <div class="d-flex justify-content-between align-items-center mb-4">
        <h2 class="text-secondary m-0"><i class="bi bi-box-seam"></i> Maestros de Ítems</h2>
        <a href="{% url 'item_crear' %}" class="btn btn-primary shadow-sm">
            <i class="bi bi-plus-lg me-2"></i>Nuevo Ítem
        </a>
    </div>
    <div class="card shadow-sm border-0">
        <div class="card-body p-0">
            <div class="table-responsive">
                <table class="table table-hover align-middle m-0">
                    <thead class="table-dark">
                        <tr>
                            <th class="ps-3">SKU</th>
                            <th>Nombre</th>
                            <th>Categoría</th>
                            <th>Tipo</th>
                            <th class="text-end pe-3">Acciones</th>
                        </tr>
                    </thead>
                    <tbody>
                        {% for i in items %}
                        <tr>
                            <td class="ps-3 fw-bold">{{ i.codigo_sku }}</td>
                            <td>{{ i.nombre }}</td>
                            <td>{{ i.categoria.nombre }}</td>
                            <td>{{ i.tipo_item }}</td>
                            <td class="text-end pe-3">
                                <a href="{% url 'item_editar' i.id %}" class="btn btn-sm btn-outline-secondary"><i class="bi bi-pencil"></i> Editar</a>
                            </td>
                        </tr>
                        {% empty %}
                        <tr><td colspan="5" class="text-center text-muted py-4">No hay ítems registrados.</td></tr>
                        {% endfor %}
                    </tbody>
                </table>
            </div>
        </div>
    </div>
</div>
{% endblock %}
